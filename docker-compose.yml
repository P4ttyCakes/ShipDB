services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: shipdb-backend:latest
    container_name: shipdb-backend
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    ports:
      - "8000:8000"          # remove this in production; nginx already proxies
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""    # empty; frontend appends /api/ itself, nginx proxies /api/* -> backend:8000
    image: shipdb-frontend:latest
    container_name: shipdb-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
